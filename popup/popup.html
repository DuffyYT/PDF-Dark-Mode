<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-title">PDF Dark Mode</div>
          <div class="brand-subtitle">Comfort reading for PDFs</div>
        </div>
      </header>

      <div id="toggle" class="toggle-card">
        <i class="fa fa-power-off" style="font-size: 32px"></i>
        <p class="shortcut-hint">Command + Shift + 1</p>
      </div>

      <section class="card inputs">
        <div class="section-title">Appearance</div>
        <div class="input-row">
          <label for="modeSelect" class="label">Mode</label>
          <select id="modeSelect">
            <option value="dark">Dark</option>
            <option value="sepia">Sepia (Pro)</option>
            <option value="amoled">AMOLED (Pro)</option>
          </select>
        </div>
        <div class="input-row">
          <label for="slider" class="label">Strength</label>
          <input id="slider" type="range" min="200" value="255" max="255" />
        </div>
        <div class="input-row">
          <label for="contrastSlider" class="label">Contrast</label>
          <input
            id="contrastSlider"
            type="range"
            min="50"
            value="100"
            max="100"
          />
        </div>
      </section>

      <!-- <section class="card">
        <div id="analyticsSummary" class="analytics-summary">
          Local analytics: 0 PDF sessions in last 7 days
        </div>
      </section> -->

      <section class="card plan-box">
        <div class="section-title">Plan</div>
        <div id="planLabel" class="plan-label">Plan: Free</div>
        <div class="billing-actions">
          <button id="subscribeBtn" type="button">Subscribe</button>
        </div>
        <button id="haveLicenseToggleBtn" type="button" class="text-link-button">
          Have a license? Activate here
        </button>
        <div id="licenseActivationPanel" class="license-activation-panel hidden">
          <div class="license-input-row">
            <label for="licenseKeyInput" class="label">License Key</label>
            <input
              id="licenseKeyInput"
              type="text"
              autocomplete="off"
              placeholder="XXXX-XXXX-XXXX-XXXX"
            />
          </div>
          <button id="activateLicenseBtn" type="button">Activate Pro</button>
        </div>
        <div id="licenseStatus" class="plan-note">
          License validation runs automatically in the background.
        </div>
        <div id="debugBillingSection" class="debug-tools hidden">
          <button id="debugRevokeBtn" type="button">Debug: Revoke Local Pro</button>
        </div>
      </section>

      <section class="card site-rule-box">
        <div class="section-title">Site Rules (Pro)</div>
        <div id="currentHostLabel" class="site-host">Current site: n/a</div>
        <div id="currentRuleLabel" class="site-rule">Rule: default (Pro)</div>
        <div class="site-rule-actions">
          <button id="allowCurrentSiteBtn" type="button">Allow</button>
          <button id="blockCurrentSiteBtn" type="button">Block</button>
          <button id="clearCurrentSiteBtn" type="button">Clear</button>
        </div>
        <div class="manual-site-row">
          <input id="manualSiteInput" type="text" placeholder="example.com" />
          <button id="allowManualSiteBtn" type="button">+Allow</button>
          <button id="blockManualSiteBtn" type="button">+Block</button>
        </div>
      </section>

      <footer class="footer">
        <div>v1.2.1</div>
        <div>
          Need help?
          <a id="supportLink">Support / Contact</a>
        </div>
      </footer>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
